<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <title>コットンパールの会</title>
        <meta name="description" content="Craft＆Eat、手しごとの時間">
        <link rel="icon" type="image/png" href="images/giraffelogo.png">
        <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CSS -->
        <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
        <link href="https://fonts.googleapis.com/css?family=Philosopher" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet">
    </head>

    <body>
        <div id="shop" class="big-bg">
            <header class="page-header wrapper">
                <h1><a href="index.html"><img class="logo" src="images/giraffelogo.png" alt="コットンパールの会"></a></h1>
                
                <!-- ハンバーガーボタンを追加 -->
                <button class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                
                <nav id="nav">
                    <ul class="main-nav">
                        <li><a href="index.html">ホーム</a></li>
                        <li><a href="about.html">私たちについて</a></li>
                        <li><a href="pastworks.html">過去の作品</a></li>
                        <li><a href="naturalstone.html">天然石のこと</a></li>
                        <li><a href="ring-position.html">指輪の位置</a></li>
                        <li><a href="shop.html">作品販売</a></li>
                        <li><a href="contact.html">お問い合わせ</a></li>
                    </ul>
                </nav>
            </header>

                    <!-- ショップへのリンクボタン -->
            <div class="shop-content wrapper">
                  <h2 class="page-title">Art Gallery and Sales</h2>
                    <p>腕を上げた生徒さんたちによる作品の販売をしております。<br>
                    過去の作品ギャラリーとして見たり、気になる作品があればご購入可能です。<br>ぜひご覧ください。</p>
                    <a class="button" href="https://amuletjewel.base.shop" target="_blank" rel="noopener noreferrer" >オンラインショップへ</a>
                </div>
            </div><!-- /.shops-content -->
        </div><!-- /#shop -->


        <footer>
            <div class="wrapper">
                <p><small>&copy; 2026 [Club Cotton pearl] All rights reserved.</small></p>
            </div>
        </footer>
                <!-- JavaScriptを追加（</body>の直前） -->
        <script>
            const hamburger = document.getElementById('hamburger');
            const nav = document.getElementById('nav');

            // ハンバーガーメニューの開閉
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                nav.classList.toggle('active');
            });

            // メニュー項目クリック時に閉じる
            const navLinks = nav.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    nav.classList.remove('active');
                });
            });

            // メニュー外をクリックしたら閉じる
            document.addEventListener('click', (e) => {
                if (!hamburger.contains(e.target) && !nav.contains(e.target)) {
                    hamburger.classList.remove('active');
                    nav.classList.remove('active');
                }
            });
        </script>
    </body>
</html>
